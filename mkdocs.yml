site_name: Jacob Dirks Testing
site_url: https://jacobdirks.github.io/testSite.github.io/
repo_url: https://github.com/JacobDirks/testSite.github.io
edit_uri: edit/main/docs/
#-----------------------------------------------------------------
# Above is site headers and places that start updates
# Below is the actual build elements

#Standard for setting up theme could add a custom theme as shown by comment below
theme:
  name: material
  #custom_dir: custom_theme/
  palette:
    primary: blue
    accent: indigo
  font:
    text: Roboto
  logo: static/logo.svg
  favicon: static/logo.png 
# Right above is how you'd add an ICON to the site

  features:
    - header.autohide
    - navigation.tabs
    - navigation.tabs.sticky
    - toc.follow    
    - navigation.top
    - navigation.path
    - navigation.indexes
    - navigation.prune
    - content.action.edit
    - navigation.footer
#    - navigation.sections
#    - navigation.expand
#    - navigation.instant # doesn't work that well


#this helps add different elements like images and charts (mermaid is a chart system)
markdown_extensions:
  - attr_list #add attributes using curly brackets to images, see https://squidfunk.github.io/mkdocs-material/reference/images/
  - md_in_html # see https://squidfunk.github.io/mkdocs-material/reference/images/
  - footnotes
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tilde: {}
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

draft_docs: |
  **/*_unpublished.md
  **/*_draft.md
  **/*_draft**
  
plugins:
  - search
  - glightbox # allow resize images, see https://squidfunk.github.io/mkdocs-material/reference/images/

extra_css:
  - stylesheets/extra.css  

extra_javascript:
 - javascripts/mathjax.js
 - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
    
not_in_nav: |
  static
   #needed for EGR 3x4 robotics path not sure for others.
copyright: "Copyright &copy; N/A"
